version: '3.8' 
 
services: 
  postgres: 
    image: postgres:15-alpine 
    container_name: lilibooking-db 
    environment: 
      POSTGRES_DB: lilibooking 
      POSTGRES_USER: lilibooking_user 
      POSTGRES_PASSWORD: lilibooking_password 
    ports: 
      - "5432:5432" 
    volumes: 
      - postgres_data:/var/lib/postgresql/data 
    networks: 
      - lilibooking-network 
 
  pgadmin: 
    image: dpage/pgadmin4 
    container_name: lilibooking-pgadmin 
    environment: 
      PGADMIN_DEFAULT_EMAIL: admin@lilibooking.com 
      PGADMIN_DEFAULT_PASSWORD: admin123 
    ports: 
      - "5050:80" 
    depends_on: 
      - postgres 
    networks: 
      - lilibooking-network 
 
networks: 
  lilibooking-network: 
    driver: bridge 
 
volumes: 
  postgres_data: 
