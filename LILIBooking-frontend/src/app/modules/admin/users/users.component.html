<div class="admin-users">
  <div class="container py-4">
    <h1 class="mb-4">Gestion des utilisateurs</h1>

    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-3">Chargement...</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="!isLoading && !errorMessage" class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Rôle</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.firstName || '-' }}</td>
            <td>{{ user.lastName || '-' }}</td>
            <td>
              <span *ngIf="editingUser?.id !== user.id" 
                    class="badge" 
                    [ngClass]="{'bg-primary': user.role === 'admin', 'bg-secondary': user.role === 'user'}">
                {{ user.role }}
              </span>
              <select *ngIf="editingUser?.id === user.id" 
                      class="form-select form-select-sm" 
                      [(ngModel)]="newRole">
                <option value="user">user</option>
                <option value="admin">admin</option>
              </select>
            </td>
            <td>
              <ng-container *ngIf="editingUser?.id !== user.id">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="startEditRole(user)">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteUser(user.id)">
                  <i class="fas fa-trash"></i>
                </button>
              </ng-container>
              <ng-container *ngIf="editingUser?.id === user.id">
                <button class="btn btn-sm btn-success me-2" (click)="saveRole()">
                  <i class="fas fa-check"></i>
                </button>
                <button class="btn btn-sm btn-secondary" (click)="cancelEdit()">
                  <i class="fas fa-times"></i>
                </button>
              </ng-container>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
