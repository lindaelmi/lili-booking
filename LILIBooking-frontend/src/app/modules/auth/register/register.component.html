<div class="register-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-8 col-lg-6">
        <div class="register-card">
          <!-- En-tête avec icône -->
          <div class="card-header text-center">
            <div class="icon-circle">
              <i class="fas fa-user-plus"></i>
            </div>
            <h2 class="mt-3">Inscription</h2>
            <p class="text-muted">Créez votre compte LILIBooking</p>
          </div>

          <!-- Formulaire -->
          <div class="card-body">
            <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
              <!-- Prénom et Nom (2 colonnes) -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="firstName" class="form-label">
                      <i class="fas fa-user me-2"></i>Prénom
                    </label>
                    <input
                      type="text"
                      id="firstName"
                      name="firstName"
                      class="form-control"
                      [(ngModel)]="firstName"
                      #firstNameInput="ngModel"
                      placeholder="Votre prénom"
                    />
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="lastName" class="form-label">
                      <i class="fas fa-user me-2"></i>Nom
                    </label>
                    <input
                      type="text"
                      id="lastName"
                      name="lastName"
                      class="form-control"
                      [(ngModel)]="lastName"
                      #lastNameInput="ngModel"
                      placeholder="Votre nom"
                    />
                  </div>
                </div>
              </div>

              <!-- Email -->
              <div class="form-group mb-3">
                <label for="email" class="form-label">
                  <i class="fas fa-envelope me-2"></i>Email <span class="text-danger">*</span>
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  [(ngModel)]="email"
                  required
                  email
                  #emailInput="ngModel"
                  placeholder="votre@email.com"
                  [class.is-invalid]="emailInput.invalid && emailInput.touched"
                />
                <div *ngIf="emailInput.invalid && emailInput.touched" class="invalid-feedback">
                  Veuillez entrer un email valide
                </div>
              </div>

              <!-- Téléphone -->
              <div class="form-group mb-3">
                <label for="phone" class="form-label">
                  <i class="fas fa-phone-alt me-2"></i>Téléphone
                </label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  class="form-control"
                  [(ngModel)]="phone"
                  #phoneInput="ngModel"
                  placeholder="+33 6 12 34 56 78"
                />
              </div>

              <!-- Mot de passe -->
              <div class="form-group mb-3">
                <label for="password" class="form-label">
                  <i class="fas fa-lock me-2"></i>Mot de passe <span class="text-danger">*</span>
                </label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  [(ngModel)]="password"
                  required
                  minlength="6"
                  #passwordInput="ngModel"
                  placeholder="••••••••"
                  [class.is-invalid]="passwordInput.invalid && passwordInput.touched"
                />
                <div *ngIf="passwordInput.invalid && passwordInput.touched" class="invalid-feedback">
                  Le mot de passe doit contenir au moins 6 caractères
                </div>
              </div>

              <!-- Confirmation mot de passe -->
              <div class="form-group mb-4">
                <label for="confirmPassword" class="form-label">
                  <i class="fas fa-check-circle me-2"></i>Confirmer le mot de passe <span class="text-danger">*</span>
                </label>
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-control"
                  [(ngModel)]="confirmPassword"
                  required
                  #confirmInput="ngModel"
                  placeholder="••••••••"
                  [class.is-invalid]="(password !== confirmPassword || confirmInput.invalid) && confirmInput.touched"
                />
                <div *ngIf="password !== confirmPassword && confirmInput.touched" class="invalid-feedback">
                  Les mots de passe ne correspondent pas
                </div>
              </div>

              <!-- Messages -->
              <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ errorMessage }}
                <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
              </div>

              <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>{{ successMessage }}
                <button type="button" class="btn-close" (click)="successMessage = ''"></button>
              </div>

              <!-- Bouton d'inscription -->
              <button 
                type="submit" 
                class="btn btn-primary w-100 py-3 mb-3"
                [disabled]="registerForm.invalid || isLoading || password !== confirmPassword">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!isLoading" class="fas fa-user-plus me-2"></i>
                {{ isLoading ? 'Inscription en cours...' : 'S\'inscrire' }}
              </button>
            </form>

            <!-- Lien vers connexion -->
            <p class="text-center mb-0">
              Déjà un compte ? 
              <a routerLink="/connexion" class="login-link">Connectez-vous</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
