<div class="admin-reviews">
  <div class="container py-4">
    <h1 class="mb-4">Gestion des avis</h1>

    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-3">Chargement...</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="!isLoading && !errorMessage" class="table-responsive">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Auteur</th>
            <th>Hôtel</th>
            <th>Note</th>
            <th>Commentaire</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reviews">
            <td>{{ r.id }}</td>
            <td>{{ r.author }}</td>
            <td>{{ r.hotel }}</td>
            <td>{{ r.rating }}/5</td>
            <td>{{ r.comment }}</td>
            <td>{{ r.date }}</td>
            <td>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteReview(r.id)">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
