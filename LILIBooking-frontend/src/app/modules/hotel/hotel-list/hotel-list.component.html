<!-- Chargement -->
<div *ngIf="(hotelService.loading$ | async) === true" class="text-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Chargement...</span>
  </div>
  <p class="mt-3">Chargement des hôtels...</p>
</div>

<!-- Erreur -->
<div *ngIf="(hotelService.error$ | async) as errorMsg" class="alert alert-danger text-center">
  <i class="fas fa-exclamation-triangle"></i> {{ errorMsg }}
  <button class="btn btn-sm btn-outline-danger ms-3" (click)="refresh()">Réessayer</button>
</div>

<!-- Contenu principal -->
<div *ngIf="(hotelService.loading$ | async) === false && (hotelService.error$ | async) === null">
  <!-- Filtres -->
  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button *ngFor="let continent of continents"
            class="btn btn-outline-primary"
            [class.active]="(selectedContinent$ | async) === continent"
            (click)="filterByContinent(continent)">
      {{ continent === 'all' ? 'Tous les continents' : continent }}
    </button>
  </div>

  <!-- Grille d'hôtels -->
  <div class="row g-4">
    <div *ngFor="let hotel of (filteredHotels$ | async)" class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img [src]="getImageUrl(hotel)" class="card-img-top" alt="{{ hotel.name }}" style="height: 200px; object-fit: cover;">

        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title mb-1">{{ hotel.name }}</h5>
            <div class="rating">
              <span *ngFor="let star of getStarRating(hotel.rating)">
                <i *ngIf="star === 'full'" class="fas fa-star text-warning"></i>
                <i *ngIf="star === 'half'" class="fas fa-star-half-alt text-warning"></i>
                <i *ngIf="star === 'empty'" class="far fa-star text-warning"></i>
              </span>
            </div>
          </div>
          <p class="text-muted small">
            <i class="fas fa-map-marker-alt"></i> {{ hotel.city }}, {{ hotel.country }}
          </p>
          <p class="card-text">{{ hotel.description | slice:0:120 }}...</p>

          <!-- Équipements -->
          <div class="amenities mb-2">
            <span *ngFor="let amenity of hotel.amenities" class="badge bg-light text-dark me-1">
              {{ amenity }}
            </span>
          </div>

          <!-- Prix -->
          <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="h5 text-primary mb-0">{{ hotel.pricePerNight }}€ <small>/nuit</small></span>
            <div>
              <button class="btn btn-sm btn-outline-danger me-2"
                      (click)="toggleFavorite(hotel.id)">
                <i [class.fas]="isFavorite(hotel.id)" [class.far]="!isFavorite(hotel.id)" class="fa-heart"></i>
              </button>
              <a [routerLink]="['/hotel', hotel.id]" class="btn btn-primary btn-sm">Réserver</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Aucun résultat -->
  <div *ngIf="(filteredHotels$ | async)?.length === 0" class="alert alert-info text-center mt-4">
    Aucun hôtel trouvé pour ce continent.
  </div>
</div>
