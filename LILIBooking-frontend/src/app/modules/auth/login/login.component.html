<div class="login-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-6 col-lg-5">
        <div class="login-card">
          <!-- En-tête avec icône -->
          <div class="card-header text-center">
            <div class="icon-circle">
              <i class="fas fa-lock"></i>
            </div>
            <h2 class="mt-3">Connexion</h2>
            <p class="text-muted">Accédez à votre compte LILIBooking</p>
          </div>

          <!-- Formulaire -->
          <div class="card-body">
            <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
              <!-- Champ email -->
              <div class="form-group mb-4">
                <label for="email" class="form-label">
                  <i class="fas fa-envelope me-2"></i>Email
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  [(ngModel)]="email"
                  required
                  email
                  #emailInput="ngModel"
                  placeholder="votre@email.com"
                  [class.is-invalid]="emailInput.invalid && emailInput.touched"
                />
                <div *ngIf="emailInput.invalid && emailInput.touched" class="invalid-feedback">
                  Veuillez entrer un email valide
                </div>
              </div>

              <!-- Champ mot de passe -->
              <div class="form-group mb-4">
                <label for="password" class="form-label">
                  <i class="fas fa-lock me-2"></i>Mot de passe
                </label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  [(ngModel)]="password"
                  required
                  #passwordInput="ngModel"
                  placeholder="••••••••"
                  [class.is-invalid]="passwordInput.invalid && passwordInput.touched"
                />
                <div *ngIf="passwordInput.invalid && passwordInput.touched" class="invalid-feedback">
                  Mot de passe requis
                </div>
              </div>

              <!-- Lien mot de passe oublié -->
              <div class="text-end mb-3">
                <a href="#" class="forgot-password">Mot de passe oublié ?</a>
              </div>

              <!-- Message d'erreur -->
              <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ errorMessage }}
                <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
              </div>

              <!-- Bouton de connexion -->
              <button 
                type="submit" 
                class="btn btn-primary w-100 py-3 mb-3"
                [disabled]="loginForm.invalid || isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!isLoading" class="fas fa-sign-in-alt me-2"></i>
                {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
              </button>
            </form>

            <!-- Lien vers inscription -->
            <p class="text-center mb-0">
              Pas encore de compte ? 
              <a routerLink="/inscription" class="register-link">Inscrivez-vous gratuitement</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
